<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{PROJECT_NAME}} — Interactive Demo</title>

  <!-- Brand overrides: these CSS custom properties are injected from config -->
  <style>
    :root {
      --wt-brand-color: hsl({{BRAND_HUE}}, 70%, 55%);
      --wt-font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--wt-font-family);
      background: #f5f5f7;
      color: #1a1a2e;
      min-height: 100vh;
    }
  </style>

  <!-- Engine stylesheets -->
  <link rel="stylesheet" href="walkthrough-engine.css" />
  <link rel="stylesheet" href="cta-module.css" />
</head>

<body>

  <!-- Phone frame wrapper: shown only when platform === "mobile" -->
  <div id="wt-phone-frame" class="wt-phone-frame" hidden>
    <div class="wt-phone-bezel">
      <div id="wt-demo-content" class="wt-demo-content">
        <!-- Demo target content is injected here by the engine -->
      </div>
    </div>
  </div>

  <!-- Desktop / web content area: shown when platform !== "mobile" -->
  <div id="wt-demo-content-web" class="wt-demo-content">
    <!-- Demo target content is injected here by the engine -->
  </div>

  <!-- Engine scripts -->
  <script src="walkthrough-engine.js"></script>
  <script src="cta-module.js"></script>

  <!-- Initialization: fetch config and boot the engine + CTA module -->
  <script>
    (function () {
      var CONFIG_PATH = 'demo-config.json';

      fetch(CONFIG_PATH)
        .then(function (res) {
          if (!res.ok) throw new Error('Failed to load config: ' + res.status);
          return res.json();
        })
        .then(function (config) {
          // Apply brand color from config
          if (config.meta && config.meta.brandColor) {
            document.documentElement.style.setProperty('--wt-brand-color', config.meta.brandColor);
          }

          // Show the correct content container based on platform
          var isMobile = config.platform === 'mobile';
          var phoneFrame = document.getElementById('wt-phone-frame');
          var webContent = document.getElementById('wt-demo-content-web');
          if (isMobile && config.mobile && config.mobile.phoneFrame) {
            phoneFrame.hidden = false;
            webContent.hidden = true;
          } else {
            phoneFrame.hidden = true;
            webContent.hidden = false;
          }

          // Create engine instance
          var container = isMobile
            ? document.getElementById('wt-demo-content')
            : webContent;

          var engine = new WalkthroughEngine(config, container);

          // Create CTA module and bind to the engine event system
          var cta = new CTAModule(config, engine);
          cta.init();

          // If no entry gate, start the tour immediately
          if (!config.entryGate || !config.entryGate.enabled) {
            engine.start();
          }
        })
        .catch(function (err) {
          console.error('[WalkthroughDemo] Initialization error:', err);
          document.body.innerHTML =
            '<p style="padding:2rem;text-align:center;color:#dc2626;">Unable to load the demo. Please refresh or contact support.</p>';
        });
    })();
  </script>

  <!-- Phone frame styles (self-contained so the template works standalone) -->
  <style>
    .wt-phone-frame {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .wt-phone-bezel {
      width: 375px;
      height: 812px;
      border: 8px solid #1a1a2e;
      border-radius: 40px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }
    .wt-demo-content {
      width: 100%;
      height: 100%;
      overflow: auto;
      position: relative;
    }
    /* Responsive: shrink phone frame on small screens */
    @media (max-width: 420px) {
      .wt-phone-bezel {
        width: 100%;
        height: 85vh;
        border-width: 4px;
        border-radius: 24px;
      }
    }
  </style>

</body>
</html>
