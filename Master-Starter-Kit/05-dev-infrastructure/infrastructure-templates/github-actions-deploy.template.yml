# GitHub Actions Deploy Pipeline
# Generated by Master Starter Kit — Orchestrator Step 11
#
# Replace {{PLACEHOLDERS}} with your project values or let the orchestrator resolve them.

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "{{NODE_VERSION}}"

jobs:
  # <!-- IF {{DEPLOY_TARGET}} == "Vercel" -->
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Pull Vercel config
        run: vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}

      # Preview deployment for PRs
      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        run: |
          url=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }})
          echo "DEPLOY_URL=$url" >> $GITHUB_ENV

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed: ${process.env.DEPLOY_URL}`
            })

      # Production deployment for main
      - name: Deploy Production
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
  # <!-- ENDIF -->

  # <!-- IF {{DEPLOY_TARGET}} == "Docker" -->
  deploy-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.REGISTRY_URL }}/{{PROJECT}}:latest
            ${{ secrets.REGISTRY_URL }}/{{PROJECT}}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  # <!-- ENDIF -->

  # <!-- IF {{HAS_MOBILE}} == "true" -->
  deploy-mobile:
    name: EAS Build (Mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build preview (PR)
        if: github.event_name == 'pull_request'
        working-directory: apps/mobile
        run: eas build --platform all --profile preview --non-interactive

      - name: Build production (main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: apps/mobile
        run: eas build --platform all --profile production --non-interactive
  # <!-- ENDIF -->
