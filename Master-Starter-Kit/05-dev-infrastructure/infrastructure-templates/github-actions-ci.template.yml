# GitHub Actions CI Pipeline
# Generated by Master Starter Kit — Orchestrator Step 11
#
# Replace {{PLACEHOLDERS}} with your project values or let the orchestrator resolve them.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "{{NODE_VERSION}}"

jobs:
  ci:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # <!-- IF {{DATABASE}} -->
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: {{PROJECT}}_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    # <!-- ENDIF -->

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # <!-- IF {{PKG_MANAGER}} == "pnpm" -->
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # <!-- ENDIF -->

      # <!-- IF {{PKG_MANAGER}} == "npm" -->
      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: ${{ env.NODE_VERSION }}
      #     cache: npm
      #
      # - name: Install dependencies
      #   run: npm ci
      # <!-- ENDIF -->

      - name: Lint
        run: {{LINT_CMD}}

      - name: Typecheck
        run: {{TYPE_CHECK_CMD}}

      - name: Unit Tests
        run: {{TEST_CMD}}
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/{{PROJECT}}_test

      - name: Build
        run: {{BUILD_CMD}}

  # <!-- IF {{HAS_E2E}} == "true" -->
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: {{BUILD_CMD}}

      - name: Run E2E
        run: pnpm test:e2e

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
  # <!-- ENDIF -->
