# =============================================================================
# github-actions-gates.yml — PR Gate Validation
#
# Runs depth, reference, cross-reference, and anti-pattern validators on every
# PR to main. Blocks merge on failure and posts a summary comment.
# =============================================================================

name: PR Gate Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'dev_docs/**'
      - 'src/**'
      - 'lib/**'
      - 'app/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-gates:
    name: Gate Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Make validators executable
        run: chmod +x tools/validators/*.sh

      - name: Run depth validator
        id: depth
        continue-on-error: true
        run: |
          echo "## Depth Validation" >> $GITHUB_STEP_SUMMARY
          if bash tools/validators/validate-depth.sh dev_docs 2>&1 | tee /tmp/depth-output.txt; then
            echo "depth_result=pass" >> $GITHUB_OUTPUT
            echo "✅ All specs meet depth requirements" >> $GITHUB_STEP_SUMMARY
          else
            echo "depth_result=fail" >> $GITHUB_OUTPUT
            echo "❌ Some specs fail depth requirements" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/depth-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run reference validator
        id: refs
        continue-on-error: true
        run: |
          echo "## Reference Validation" >> $GITHUB_STEP_SUMMARY
          if bash tools/validators/validate-refs.sh dev_docs 2>&1 | tee /tmp/refs-output.txt; then
            echo "refs_result=pass" >> $GITHUB_OUTPUT
            echo "✅ All internal references resolve" >> $GITHUB_STEP_SUMMARY
          else
            echo "refs_result=fail" >> $GITHUB_OUTPUT
            echo "❌ Broken references found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/refs-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run cross-reference validator
        id: crossrefs
        continue-on-error: true
        run: |
          echo "## Cross-Reference Validation" >> $GITHUB_STEP_SUMMARY
          if bash tools/validators/validate-cross-refs.sh dev_docs 2>&1 | tee /tmp/crossrefs-output.txt; then
            echo "crossrefs_result=pass" >> $GITHUB_OUTPUT
            echo "✅ All cross-references valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "crossrefs_result=fail" >> $GITHUB_OUTPUT
            echo "❌ Cross-reference mismatches found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/crossrefs-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run anti-pattern detector
        id: antipatterns
        continue-on-error: true
        run: |
          echo "## Anti-Pattern Detection" >> $GITHUB_STEP_SUMMARY
          if bash tools/validators/detect-anti-patterns.sh . 2>&1 | tee /tmp/antipatterns-output.txt; then
            echo "antipatterns_result=pass" >> $GITHUB_OUTPUT
            echo "✅ No FAIL-level anti-patterns" >> $GITHUB_STEP_SUMMARY
          else
            echo "antipatterns_result=fail" >> $GITHUB_OUTPUT
            echo "❌ FAIL-level anti-patterns detected" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/antipatterns-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const depth = '${{ steps.depth.outputs.depth_result }}';
            const refs = '${{ steps.refs.outputs.refs_result }}';
            const crossrefs = '${{ steps.crossrefs.outputs.crossrefs_result }}';
            const antipatterns = '${{ steps.antipatterns.outputs.antipatterns_result }}';

            const icon = (r) => r === 'pass' ? '✅' : '❌';
            const allPass = [depth, refs, crossrefs, antipatterns].every(r => r === 'pass');

            const body = [
              `## ${allPass ? '✅' : '🚫'} Gate Validation Results`,
              '',
              `| Validator | Result |`,
              `|-----------|--------|`,
              `| Depth | ${icon(depth)} ${depth} |`,
              `| References | ${icon(refs)} ${refs} |`,
              `| Cross-References | ${icon(crossrefs)} ${crossrefs} |`,
              `| Anti-Patterns | ${icon(antipatterns)} ${antipatterns} |`,
              '',
              allPass
                ? '**All gates passed.** This PR may be merged.'
                : '**One or more gates failed.** Fix the issues above before merging.',
            ].join('\n');

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Gate Validation Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on gate violations
        if: |
          steps.depth.outputs.depth_result == 'fail' ||
          steps.refs.outputs.refs_result == 'fail' ||
          steps.crossrefs.outputs.crossrefs_result == 'fail' ||
          steps.antipatterns.outputs.antipatterns_result == 'fail'
        run: |
          echo "::error::One or more gate validators failed. See PR comment for details."
          exit 1
