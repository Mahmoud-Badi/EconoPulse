<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Review Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background-color: #18181b; color: #e4e4e7; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #27272a; }
    ::-webkit-scrollbar-thumb { background: #52525b; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #71717a; }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-zinc-900 text-zinc-200 antialiased">

  <!-- ============================================================ -->
  <!-- CONFIG — edit this block to match your project                -->
  <!-- ============================================================ -->
  <script>
    const CONFIG = {
      projectName: '{{PROJECT_NAME}}',
      designsPath: '{{DESIGNS_PATH}}',
      thumbsPath: 'thumbs/',
      screens: [
        // { key: 'dashboard', label: 'Dashboard', file: 'dashboard.html', color: '#6366f1' },
        // { key: 'settings',  label: 'Settings',  file: 'settings.html',  color: '#8b5cf6' },
        // { key: 'profile',   label: 'Profile',   file: 'profile.html',   color: '#06b6d4' },
        // { key: 'inbox',     label: 'Inbox',     file: 'inbox.html',     color: '#f59e0b' },
      ],
      styles: [
        // { key: 'style-01', label: 'Style 01' },
        // { key: 'style-02', label: 'Style 02' },
        // { key: 'style-03', label: 'Style 03' },
      ],
      elementsPerScreen: {
        // dashboard: ['header', 'kpi-cards', 'chart', 'sidebar', 'activity-feed'],
        // settings:  ['nav', 'form', 'toggles', 'save-bar'],
      }
    };
  </script>

  <!-- ============================================================ -->
  <!-- TOP BAR                                                       -->
  <!-- ============================================================ -->
  <header class="sticky top-0 z-50 bg-zinc-900/95 backdrop-blur border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center gap-4 flex-wrap">
      <!-- Title -->
      <div class="flex items-center gap-3 mr-auto">
        <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm0 8a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zm10 0a1 1 0 011-1h4a1 1 0 011 1v6a1 1 0 01-1 1h-4a1 1 0 01-1-1v-6z"/>
          </svg>
        </div>
        <div>
          <h1 class="text-base font-semibold text-zinc-100 leading-tight">Design Review</h1>
          <p id="project-name" class="text-xs text-zinc-500 leading-tight"></p>
        </div>
      </div>

      <!-- Progress bar -->
      <div class="flex items-center gap-3 min-w-[200px]">
        <div class="flex-1 h-2 bg-zinc-800 rounded-full overflow-hidden">
          <div id="progress-bar" class="h-full rounded-full transition-all duration-500 ease-out" style="width:0%"></div>
        </div>
        <span id="progress-text" class="text-xs font-medium text-zinc-400 whitespace-nowrap"></span>
      </div>

      <!-- Export -->
      <button id="btn-export" onclick="exportJSON()"
        class="px-3 py-1.5 text-xs font-medium rounded-md bg-zinc-800 border border-zinc-700 text-zinc-300
               hover:bg-zinc-700 hover:border-zinc-600 hover:text-zinc-100 transition-all duration-150
               flex items-center gap-1.5">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        Export JSON
      </button>
    </div>
  </header>

  <!-- ============================================================ -->
  <!-- FILTER BAR                                                    -->
  <!-- ============================================================ -->
  <div class="border-b border-zinc-800/60">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center gap-3 flex-wrap">
      <!-- Screen type -->
      <select id="filter-screen" onchange="renderGrid()"
        class="px-3 py-1.5 text-sm rounded-md bg-zinc-800 border border-zinc-700 text-zinc-300
               hover:border-zinc-600 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/30
               outline-none transition-all cursor-pointer">
        <option value="all">All Screens</option>
      </select>

      <!-- Style -->
      <select id="filter-style" onchange="renderGrid()"
        class="px-3 py-1.5 text-sm rounded-md bg-zinc-800 border border-zinc-700 text-zinc-300
               hover:border-zinc-600 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/30
               outline-none transition-all cursor-pointer">
        <option value="all">All Styles</option>
      </select>

      <!-- Status -->
      <select id="filter-status" onchange="renderGrid()"
        class="px-3 py-1.5 text-sm rounded-md bg-zinc-800 border border-zinc-700 text-zinc-300
               hover:border-zinc-600 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/30
               outline-none transition-all cursor-pointer">
        <option value="all">All Status</option>
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
      </select>

      <!-- Search -->
      <div class="relative flex-1 min-w-[180px]">
        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input id="filter-search" type="text" placeholder="Search designs..." oninput="renderGrid()"
          class="w-full pl-8 pr-3 py-1.5 text-sm rounded-md bg-zinc-800 border border-zinc-700 text-zinc-300
                 placeholder-zinc-500 hover:border-zinc-600 focus:border-indigo-500 focus:ring-1
                 focus:ring-indigo-500/30 outline-none transition-all">
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- STATS ROW                                                     -->
  <!-- ============================================================ -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-5 pb-2">
    <div class="grid grid-cols-2 sm:grid-cols-5 gap-3">
      <div class="bg-zinc-800/50 border border-zinc-800 rounded-lg px-4 py-3">
        <p class="text-xs text-zinc-500 font-medium uppercase tracking-wider">Total</p>
        <p id="stat-total" class="text-xl font-semibold text-zinc-100 mt-0.5">0</p>
      </div>
      <div class="bg-zinc-800/50 border border-zinc-800 rounded-lg px-4 py-3">
        <p class="text-xs text-zinc-500 font-medium uppercase tracking-wider">Reviewed</p>
        <p id="stat-reviewed" class="text-xl font-semibold text-zinc-100 mt-0.5">0</p>
      </div>
      <div class="bg-zinc-800/50 border border-zinc-800 rounded-lg px-4 py-3">
        <p class="text-xs text-zinc-500 font-medium uppercase tracking-wider">Approved</p>
        <p id="stat-approved" class="text-xl font-semibold text-emerald-400 mt-0.5">0</p>
      </div>
      <div class="bg-zinc-800/50 border border-zinc-800 rounded-lg px-4 py-3">
        <p class="text-xs text-zinc-500 font-medium uppercase tracking-wider">Rejected</p>
        <p id="stat-rejected" class="text-xl font-semibold text-red-400 mt-0.5">0</p>
      </div>
      <div class="bg-zinc-800/50 border border-zinc-800 rounded-lg px-4 py-3 col-span-2 sm:col-span-1">
        <p class="text-xs text-zinc-500 font-medium uppercase tracking-wider">Avg Rating</p>
        <p id="stat-avg" class="text-xl font-semibold text-amber-400 mt-0.5">--</p>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- CARD GRID                                                     -->
  <!-- ============================================================ -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5">
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden flex-col items-center justify-center py-24 text-center">
      <div class="w-16 h-16 rounded-full bg-zinc-800 flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-zinc-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z"/>
        </svg>
      </div>
      <p class="text-zinc-400 font-medium mb-1">No designs found.</p>
      <p class="text-zinc-500 text-sm">Run <code class="px-1.5 py-0.5 bg-zinc-800 rounded text-xs font-mono text-zinc-400">/review:thumbs</code> to generate thumbnails.</p>
    </div>
  </main>

  <!-- ============================================================ -->
  <!-- KEYBOARD HINT                                                 -->
  <!-- ============================================================ -->
  <footer class="border-t border-zinc-800/60 mt-4">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-center">
      <p class="text-xs text-zinc-600">
        <span class="text-zinc-500">Keyboard:</span>
        <kbd class="mx-1 px-1.5 py-0.5 bg-zinc-800 border border-zinc-700 rounded text-[10px] font-mono text-zinc-400">&larr;</kbd>
        <kbd class="px-1.5 py-0.5 bg-zinc-800 border border-zinc-700 rounded text-[10px] font-mono text-zinc-400">&rarr;</kbd>
        <span class="ml-1">navigate</span>
        <span class="mx-2 text-zinc-700">|</span>
        <kbd class="px-1.5 py-0.5 bg-zinc-800 border border-zinc-700 rounded text-[10px] font-mono text-zinc-400">1</kbd>-<kbd class="px-1.5 py-0.5 bg-zinc-800 border border-zinc-700 rounded text-[10px] font-mono text-zinc-400">5</kbd>
        <span class="ml-1">rate</span>
        <span class="mx-2 text-zinc-700">|</span>
        <kbd class="px-1.5 py-0.5 bg-zinc-800 border border-zinc-700 rounded text-[10px] font-mono text-zinc-400">A</kbd>
        <span class="ml-1">approve</span>
        <span class="mx-2 text-zinc-700">|</span>
        <kbd class="px-1.5 py-0.5 bg-zinc-800 border border-zinc-700 rounded text-[10px] font-mono text-zinc-400">R</kbd>
        <span class="ml-1">reject</span>
      </p>
    </div>
  </footer>

  <!-- ============================================================ -->
  <!-- APPLICATION LOGIC                                             -->
  <!-- ============================================================ -->
  <script>
    // --------------- Helpers ---------------
    function slugify(str) {
      return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }

    function getStorageKey() {
      return 'designReview_' + slugify(CONFIG.projectName || 'untitled');
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(getStorageKey());
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && parsed.version === 1) return parsed;
        }
      } catch (e) { /* ignore */ }
      return {
        version: 1,
        projectName: CONFIG.projectName,
        reviews: {}
      };
    }

    function saveData(data) {
      localStorage.setItem(getStorageKey(), JSON.stringify(data));
    }

    function getReview(styleKey, screenKey) {
      const data = loadData();
      const id = styleKey + '_' + screenKey;
      return data.reviews[id] || { rating: null, status: 'pending', elements: {}, notes: '', reviewedAt: null };
    }

    function setReview(styleKey, screenKey, updates) {
      const data = loadData();
      const id = styleKey + '_' + screenKey;
      const existing = data.reviews[id] || { rating: null, status: 'pending', elements: {}, notes: '', reviewedAt: null };
      data.reviews[id] = { ...existing, ...updates, reviewedAt: new Date().toISOString() };
      saveData(data);
    }

    // --------------- Design pairs ---------------
    function getAllDesigns() {
      const designs = [];
      for (const style of CONFIG.styles) {
        for (const screen of CONFIG.screens) {
          designs.push({ style, screen });
        }
      }
      return designs;
    }

    // --------------- Populate filters ---------------
    function populateFilters() {
      const screenSelect = document.getElementById('filter-screen');
      CONFIG.screens.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.key;
        opt.textContent = s.label;
        screenSelect.appendChild(opt);
      });

      const styleSelect = document.getElementById('filter-style');
      CONFIG.styles.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.key;
        opt.textContent = s.label;
        styleSelect.appendChild(opt);
      });
    }

    // --------------- Stats ---------------
    function computeStats() {
      const designs = getAllDesigns();
      const total = designs.length;
      let reviewed = 0, approved = 0, rejected = 0, ratingSum = 0, ratingCount = 0;

      designs.forEach(({ style, screen }) => {
        const r = getReview(style.key, screen.key);
        const isReviewed = r.rating !== null || r.status !== 'pending';
        if (isReviewed) reviewed++;
        if (r.status === 'approved') approved++;
        if (r.status === 'rejected') rejected++;
        if (r.rating !== null) { ratingSum += r.rating; ratingCount++; }
      });

      return { total, reviewed, approved, rejected, avgRating: ratingCount ? (ratingSum / ratingCount) : null };
    }

    function updateStats() {
      const s = computeStats();
      document.getElementById('stat-total').textContent = s.total;
      document.getElementById('stat-reviewed').textContent = s.reviewed;
      document.getElementById('stat-approved').textContent = s.approved;
      document.getElementById('stat-rejected').textContent = s.rejected;
      document.getElementById('stat-avg').textContent = s.avgRating !== null ? s.avgRating.toFixed(1) : '--';

      // Progress
      const pct = s.total > 0 ? Math.round((s.reviewed / s.total) * 100) : 0;
      const bar = document.getElementById('progress-bar');
      bar.style.width = pct + '%';
      bar.className = 'h-full rounded-full transition-all duration-500 ease-out ';
      if (pct >= 75) bar.classList.add('bg-emerald-500');
      else if (pct >= 25) bar.classList.add('bg-amber-500');
      else bar.classList.add('bg-red-500');
      document.getElementById('progress-text').textContent = s.reviewed + ' / ' + s.total;
    }

    // --------------- Stars ---------------
    function renderStars(rating, styleKey, screenKey) {
      let html = '<div class="flex items-center gap-0.5">';
      for (let i = 1; i <= 5; i++) {
        const filled = rating !== null && i <= rating;
        html += `<button onclick="event.stopPropagation(); quickRate('${styleKey}','${screenKey}',${i})"
          class="w-5 h-5 transition-colors duration-100 ${filled ? 'text-amber-400 hover:text-amber-300' : 'text-zinc-600 hover:text-zinc-400'}"
          title="Rate ${i}">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
          </svg>
        </button>`;
      }
      html += '</div>';
      return html;
    }

    function quickRate(styleKey, screenKey, rating) {
      setReview(styleKey, screenKey, { rating });
      renderGrid();
    }

    // --------------- Status badge ---------------
    function statusBadge(status) {
      const map = {
        pending:  'bg-zinc-700 text-zinc-300',
        approved: 'bg-emerald-900/60 text-emerald-300 border border-emerald-700/50',
        rejected: 'bg-red-900/60 text-red-300 border border-red-700/50'
      };
      const label = status.charAt(0).toUpperCase() + status.slice(1);
      return `<span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-medium uppercase tracking-wider ${map[status] || map.pending}">${label}</span>`;
    }

    // --------------- Card border ---------------
    function cardBorderClass(status) {
      if (status === 'approved') return 'border-l-2 border-l-emerald-500';
      if (status === 'rejected') return 'border-l-2 border-l-red-500';
      return 'border-l-2 border-l-transparent';
    }

    // --------------- Render grid ---------------
    let currentSelectedIndex = -1;
    let filteredDesigns = [];

    function renderGrid() {
      const screenFilter = document.getElementById('filter-screen').value;
      const styleFilter = document.getElementById('filter-style').value;
      const statusFilter = document.getElementById('filter-status').value;
      const searchTerm = document.getElementById('filter-search').value.toLowerCase().trim();

      let designs = getAllDesigns();

      // Apply filters
      if (screenFilter !== 'all') designs = designs.filter(d => d.screen.key === screenFilter);
      if (styleFilter !== 'all') designs = designs.filter(d => d.style.key === styleFilter);
      if (statusFilter !== 'all') designs = designs.filter(d => getReview(d.style.key, d.screen.key).status === statusFilter);
      if (searchTerm) {
        designs = designs.filter(d =>
          d.style.label.toLowerCase().includes(searchTerm) ||
          d.screen.label.toLowerCase().includes(searchTerm) ||
          d.style.key.toLowerCase().includes(searchTerm) ||
          d.screen.key.toLowerCase().includes(searchTerm)
        );
      }

      filteredDesigns = designs;
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty-state');

      if (designs.length === 0) {
        grid.innerHTML = '';
        grid.classList.add('hidden');
        empty.classList.remove('hidden');
        empty.classList.add('flex');
        updateStats();
        return;
      }

      grid.classList.remove('hidden');
      empty.classList.add('hidden');
      empty.classList.remove('flex');

      grid.innerHTML = designs.map((d, idx) => {
        const r = getReview(d.style.key, d.screen.key);
        const thumbSrc = CONFIG.thumbsPath + d.style.key + '_' + d.screen.key + '.png';
        const isSelected = idx === currentSelectedIndex;
        const selectedRing = isSelected ? 'ring-2 ring-indigo-500/70' : '';

        return `
          <div data-index="${idx}"
            class="group relative bg-zinc-800 rounded-lg overflow-hidden border border-zinc-700/50
                   ${cardBorderClass(r.status)} ${selectedRing}
                   hover:border-zinc-600 hover:shadow-lg hover:shadow-black/20
                   transition-all duration-200 cursor-pointer"
            onclick="openReview('${d.style.key}','${d.screen.key}')">

            <!-- Thumbnail -->
            <div class="relative aspect-[16/10] bg-zinc-900 overflow-hidden">
              <img src="${thumbSrc}" alt="${d.style.label} - ${d.screen.label}"
                class="w-full h-full object-cover object-top transition-transform duration-300 group-hover:scale-[1.03]"
                onerror="this.parentElement.innerHTML='<div class=\\'flex items-center justify-center w-full h-full text-zinc-600\\'><svg class=\\'w-10 h-10\\' fill=\\'none\\' viewBox=\\'0 0 24 24\\' stroke=\\'currentColor\\' stroke-width=\\'1\\'><path stroke-linecap=\\'round\\' stroke-linejoin=\\'round\\' d=\\'M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z\\'/></svg></div>'" />

              <!-- Screen color indicator -->
              <div class="absolute top-2 right-2 w-2.5 h-2.5 rounded-full opacity-80" style="background:${d.screen.color || '#6366f1'}"></div>
            </div>

            <!-- Card body -->
            <div class="p-3 space-y-2">
              <div class="flex items-start justify-between gap-2">
                <div class="min-w-0">
                  <p class="text-sm font-medium text-zinc-200 truncate">${d.style.label}</p>
                  <p class="text-xs text-zinc-500 truncate">${d.screen.label}</p>
                </div>
                ${statusBadge(r.status)}
              </div>

              <!-- Stars -->
              ${renderStars(r.rating, d.style.key, d.screen.key)}
            </div>
          </div>`;
      }).join('');

      updateStats();
    }

    // --------------- Navigation ---------------
    function openReview(styleKey, screenKey) {
      window.location.href = 'review.html?style=' + encodeURIComponent(styleKey) + '&screen=' + encodeURIComponent(screenKey);
    }

    // --------------- Keyboard ---------------
    document.addEventListener('keydown', function(e) {
      // Ignore when typing in inputs
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        if (filteredDesigns.length === 0) return;
        currentSelectedIndex = Math.max(0, currentSelectedIndex - 1);
        renderGrid();
        scrollToSelected();
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        if (filteredDesigns.length === 0) return;
        currentSelectedIndex = Math.min(filteredDesigns.length - 1, currentSelectedIndex + 1);
        renderGrid();
        scrollToSelected();
      } else if (e.key === 'Enter' && currentSelectedIndex >= 0 && currentSelectedIndex < filteredDesigns.length) {
        e.preventDefault();
        const d = filteredDesigns[currentSelectedIndex];
        openReview(d.style.key, d.screen.key);
      } else if (e.key >= '1' && e.key <= '5' && currentSelectedIndex >= 0 && currentSelectedIndex < filteredDesigns.length) {
        e.preventDefault();
        const d = filteredDesigns[currentSelectedIndex];
        quickRate(d.style.key, d.screen.key, parseInt(e.key));
      } else if ((e.key === 'a' || e.key === 'A') && currentSelectedIndex >= 0 && currentSelectedIndex < filteredDesigns.length) {
        e.preventDefault();
        const d = filteredDesigns[currentSelectedIndex];
        setReview(d.style.key, d.screen.key, { status: 'approved' });
        renderGrid();
      } else if ((e.key === 'r' || e.key === 'R') && currentSelectedIndex >= 0 && currentSelectedIndex < filteredDesigns.length) {
        e.preventDefault();
        const d = filteredDesigns[currentSelectedIndex];
        setReview(d.style.key, d.screen.key, { status: 'rejected' });
        renderGrid();
      }
    });

    function scrollToSelected() {
      const card = document.querySelector(`[data-index="${currentSelectedIndex}"]`);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // --------------- Export ---------------
    function exportJSON() {
      const data = loadData();
      const stats = computeStats();
      const designs = getAllDesigns();

      // Per-screen breakdown: which style won for each screen
      const screenBreakdowns = {};
      CONFIG.screens.forEach(screen => {
        let bestStyle = null;
        let bestRating = 0;
        CONFIG.styles.forEach(style => {
          const r = getReview(style.key, screen.key);
          if (r.rating !== null && r.rating > bestRating) {
            bestRating = r.rating;
            bestStyle = style.key;
          }
        });
        screenBreakdowns[screen.key] = {
          label: screen.label,
          winningStyle: bestStyle,
          winningRating: bestRating || null,
          reviews: {}
        };
        CONFIG.styles.forEach(style => {
          screenBreakdowns[screen.key].reviews[style.key] = getReview(style.key, screen.key);
        });
      });

      // Top-rated styles
      const styleRatings = {};
      CONFIG.styles.forEach(style => {
        let sum = 0, count = 0;
        CONFIG.screens.forEach(screen => {
          const r = getReview(style.key, screen.key);
          if (r.rating !== null) { sum += r.rating; count++; }
        });
        styleRatings[style.key] = { label: style.label, avgRating: count ? +(sum / count).toFixed(2) : null, reviewedScreens: count };
      });
      const topStyles = Object.entries(styleRatings)
        .filter(([, v]) => v.avgRating !== null)
        .sort((a, b) => b[1].avgRating - a[1].avgRating)
        .map(([key, v]) => ({ key, ...v }));

      // Element trend analysis
      const elementLikes = {};
      const elementDislikes = {};
      Object.values(data.reviews).forEach(review => {
        if (!review.elements) return;
        Object.entries(review.elements).forEach(([el, verdict]) => {
          if (!elementLikes[el]) { elementLikes[el] = 0; elementDislikes[el] = 0; }
          if (verdict === 'liked') elementLikes[el]++;
          if (verdict === 'disliked') elementDislikes[el]++;
        });
      });
      const elementTrends = {};
      const allElements = new Set([...Object.keys(elementLikes), ...Object.keys(elementDislikes)]);
      allElements.forEach(el => {
        elementTrends[el] = { liked: elementLikes[el] || 0, disliked: elementDislikes[el] || 0 };
      });
      const mostLiked = [...allElements].sort((a, b) => (elementLikes[b] || 0) - (elementLikes[a] || 0)).slice(0, 5);
      const mostDisliked = [...allElements].sort((a, b) => (elementDislikes[b] || 0) - (elementDislikes[a] || 0)).slice(0, 5);

      const exportObj = {
        meta: {
          projectName: CONFIG.projectName,
          exportDate: new Date().toISOString(),
          totalDesigns: stats.total
        },
        summary: {
          avgRating: stats.avgRating !== null ? +stats.avgRating.toFixed(2) : null,
          approvalRate: stats.total > 0 ? +((stats.approved / stats.total) * 100).toFixed(1) : 0,
          reviewed: stats.reviewed,
          approved: stats.approved,
          rejected: stats.rejected,
          topStyles
        },
        screenBreakdowns,
        elementAnalysis: {
          trends: elementTrends,
          mostLiked,
          mostDisliked
        },
        rawReviews: data.reviews
      };

      const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'design-review-export.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // --------------- Init ---------------
    function init() {
      document.getElementById('project-name').textContent = CONFIG.projectName || 'Untitled Project';
      document.title = 'Design Review — ' + (CONFIG.projectName || 'Untitled');
      populateFilters();
      renderGrid();
    }

    init();
  </script>

</body>
